<!DOCTYPE html>
<html>
<head>
  <title>Siri‑ish Fullscreen</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: #111;
      color: #eee;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #siriish {
      background: #222;
      border-radius: 20px;
      width: 95%;
      height: 95%;
      display: flex;
      flex-direction: column;
      padding: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.6);
    }
    #header {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 10px;
      text-align: center;
    }
    #conversation {
      flex: 1;
      background: #111;
      border-radius: 12px;
      padding: 15px;
      overflow-y: auto;
      margin-bottom: 15px;
    }
    #conversation div {
      margin: 8px 0;
    }
    #inputBar {
      display: flex;
      gap: 10px;
    }
    #inputBar input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #333;
      color: #eee;
    }
    #inputBar button {
      padding: 10px 15px;
      border-radius: 8px;
      border: none;
      background: #555;
      color: #fff;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="siriish">
    <div id="header">Siri‑ish Assistant</div>
    <div id="conversation"></div>
    <div id="inputBar">
      <input id="cmd" placeholder="Ask me something…" />
      <button onclick="ask()">Ask</button>
    </div>
  </div>

  <script>
    const convo = document.getElementById("conversation");

    function addLine(text, who="Siri‑ish") {
      const div = document.createElement("div");
      div.textContent = who + ": " + text;
      convo.appendChild(div);
      convo.scrollTop = convo.scrollHeight;
    }

    async function ask() {
      const cmd = document.getElementById("cmd").value.trim();
      if (!cmd) return;

      addLine(cmd, "You");

      let endpoint = "https://still-cell-3b8a.thcorporation8.workers.dev";

      if (cmd.toLowerCase().includes("real joke")) {
        endpoint += "?action=real_joke";
      } else if (cmd.toLowerCase().includes("real roast")) {
        endpoint += "?action=real_roast";
      }

      try {
        const res = await fetch(endpoint);
        const text = await res.text();
        addLine(text);
      } catch (err) {
        addLine("Error contacting Siri‑ish Worker.");
      }

      document.getElementById("cmd").value = "";
    }
  </script>
</body>
</html>
